<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | Unblocked 4K</title>
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #00ffcc; background: #0f172a; }
        .brand { font-size: 28px; font-weight: 900; color: #00ffcc; letter-spacing: 2px; }
        
        .main-container { height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        /* Premium Watch Button - यो कहिल्यै ब्लक हुँदैन */
        .watch-btn {
            background: linear-gradient(45deg, #00ffcc, #3b82f6);
            color: #000;
            padding: 22px 50px;
            border-radius: 15px;
            font-size: 22px;
            font-weight: 900;
            text-decoration: none;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            transition: 0.3s ease;
            text-transform: uppercase;
            display: inline-block;
        }
        .watch-btn:hover { transform: scale(1.1); box-shadow: 0 0 60px rgba(0, 255, 204, 0.7); }

        .info-card { margin-top: 40px; background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; max-width: 450px; }
        .live-dot { color: #ff3b30; animation: blink 1s infinite; font-size: 20px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.2;} 100% {opacity:1;} }
        
        .status { color: #00ffcc; font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<header><div class="brand">AURALIVE.</div></header>

<div class="main-container">
    <div style="margin-bottom: 30px;">
        <span class="live-dot">●</span> <b style="font-size: 22px;">LIVE: PBKS VS RR (YOSHIN TV)</b>
    </div>

    <a href="https://yoshintv.com/live/ipl-live-stream-1/" target="_blank" class="watch-btn">
        START 4K STREAMING
    </a>

    <div class="info-card">
        <span class="status">SERVER: UNBLOCKED ✅</span>
        <p style="font-size: 14px; color: #94a3b8; line-height: 1.6; margin: 0;">
            YouTube has blocked the player in your region. <b>Click the button above</b> to open the match directly in Yoshin TV. This will work 100% and show no errors.
        </p>
    </div>
</div>

<footer style="margin-top: 20px; font-size: 11px; color: #475569;">
    Aura Engine v10.0 | Anti-Block Technology
</footer>

</body>
</html>
