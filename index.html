<div id="countdown" style="background: #1e293b; color: #ffc300; padding: 15px; text-align: center; font-weight: bold; border-radius: 8px; margin: 10px;">
    Loading Match Time...
</div>

<script>
    function updateTimer() {
        const matchTime = new Date("April 28, 2026 19:15:00").getTime();
        const now = new Date().getTime();
        const diff = matchTime - now;

        if (diff > 0) {
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = "Match Starts In: " + hours + "h " + minutes + "m " + seconds + "s";
        } else {
            document.getElementById("countdown").innerHTML = "● MATCH IS LIVE NOW!";
            document.getElementById("countdown").style.color = "red";
        }
    }
    setInterval(updateTimer, 1000);
</script>
