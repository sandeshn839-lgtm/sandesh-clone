<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA LIVE - Nepal vs UAE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .player-window { 
            max-width: 900px; margin: 80px auto 20px; background: #000; 
            aspect-ratio: 16/9; border: 2px solid #2563eb; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 0 20px rgba(37,99,235,0.5);
        }
        video { width: 100%; height: 100%; }
        .match-row { 
            background: #1e293b; padding: 20px; margin: 10px auto; 
            max-width: 850px; border-radius: 10px; display: flex; 
            justify-content: space-between; align-items: center; border: 1px solid #334155;
        }
        .btn-live { 
            background: #ef4444; color: white; padding: 12px 24px; 
            border-radius: 50px; font-weight: 900; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full bg-slate-900 p-4 border-b border-slate-800 z-50">
        <h1 class="text-xl font-black text-blue-500">AURA LIVE</h1>
    </header>

    <div class="player-window">
        <video id="main_player" controls autoplay playsinline></video>
    </div>

    <div class="px-4">
        <div class="bg-blue-600 text-center py-3 rounded-lg font-bold mb-6">NEPAL vs UAE - LIVE NOW</div>
        
        <div class="match-row">
            <div class="text-center flex-1">
                <p class="font-bold">Nepal</p>
                <img src="https://flagcdn.com/w80/np.png" class="mx-auto mt-2 w-12">
            </div>
            <button onclick="forcePlay('https://linearjitp-pa.akamaized.net/node/astrop_v0/636/index.m3u8')" class="btn-live">WATCH LIVE</button>
            <div class="text-center flex-1">
                <p class="font-bold">UAE</p>
                <img src="https://flagcdn.com/w80/ae.png" class="mx-auto mt-2 w-12">
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('main_player');
        let hls = new Hls();

        function forcePlay(url) {
            console.log("Attempting to play:", url);
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => alert("Please click the play button on the video player!"));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        // डिफल्ट लोड
        window.onload = () => {
            forcePlay('https://linearjitp-pa.akamaized.net/node/astrop_v0/636/index.m3u8');
        };
    </script>
</body>
</html>
