<div id="reels-section" onscroll="handleReelScroll()">
    <div id="reel-container">
        <div class="reel-video">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&controls=0" frameborder="0"></iframe>
            <div class="reel-info"><b>Funny Reel #1</b><br>@sandesh_vlogs</div>
        </div>
        <div class="reel-video">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/3JZ_D3ELwOQ?autoplay=0&controls=0" frameborder="0"></iframe>
            <div class="reel-info"><b>Funny Reel #2</b><br>@funny_nepal</div>
        </div>
    </div>
    <div id="loading-reels" style="color:white; text-align:center; padding:20px; display:none;">Loading more...</div>
</div>

<script>
    // भिडियोहरूको लिङ्क सूची (तिमीले यहाँ अरू थप्न सक्छौ)
    const videoList = [
        "https://www.youtube.com/embed/9bZkp7q19f0",
        "https://www.youtube.com/embed/2Vv-BfVoq4g",
        "https://www.youtube.com/embed/L_jWHffIx5E",
        "https://www.youtube.com/embed/7wtfhZwyrcc"
    ];

    function handleReelScroll() {
        const section = document.getElementById('reels-section');
        const container = document.getElementById('reel-container');
        
        // यदि प्रयोगकर्ता अन्तिम तिर पुग्यो भने नयाँ भिडियो थप्ने
        if (section.scrollTop + section.clientHeight >= section.scrollHeight - 5) {
            addNewReel();
        }
    }

    function addNewReel() {
        const container = document.getElementById('reel-container');
        const loader = document.getElementById('loading-reels');
        
        loader.style.display = "block";

        // रेन्डम भिडियो छान्ने
        const randomVid = videoList[Math.floor(Math.random() * videoList.length)];
        const reelCount = container.children.length + 1;

        // नयाँ भिडियो कार्ड बनाउने
        const newReel = document.createElement('div');
        newReel.className = 'reel-video';
        newReel.innerHTML = `
            <iframe width="100%" height="100%" src="${randomVid}?autoplay=0&controls=0" frameborder="0"></iframe>
            <div class="reel-info"><b>Funny Reel #${reelCount}</b><br>@S-Connect_Viral</div>
        `;

        // १ सेकेन्डको लोड पछि थप्ने (वास्तविक देखिनको लागि)
        setTimeout(() => {
            container.appendChild(newReel);
            loader.style.display = "none";
        }, 800);
    }
</script>
