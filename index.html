<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANDESH ETHICAL HACKING TOOLS</title>
    <style>
        :root { --neon-green: #0f0; --neon-purple: #bc13fe; --bg: #000; --cyan: #00d4ff; }
        body { background: var(--bg); color: var(--neon-green); font-family: 'Consolas', monospace; margin: 0; text-align: center; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { border: 2px solid var(--neon-purple); padding: 30px; border-radius: 15px; box-shadow: 0 0 20px var(--neon-purple); width: 320px; background: #050505; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid var(--neon-green); color: #0f0; border-radius: 5px; outline: none; }
        
        /* Dashboard */
        #dashboard { display: none; padding: 20px; }
        .btn-row { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 20px; }
        .tool-btn { width: 90%; max-width: 400px; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: var(--neon-green); color: #000; font-size: 13px; box-shadow: 0 4px 10px rgba(0,255,0,0.2); }

        /* Panels */
        .panel { display: none; border: 1px solid #333; margin: 20px auto; width: 95%; max-width: 700px; padding: 20px; background: rgba(0,255,0,0.02); text-align: left; border-radius: 10px; }
        #ai-display { height: 250px; overflow-y: auto; background: #050505; padding: 15px; border: 1px solid #222; margin-bottom: 15px; border-radius: 8px; font-size: 14px; }
        .ai-msg { color: var(--cyan); margin-bottom: 10px; padding-left: 10px; border-left: 2px solid var(--cyan); }
        .user-msg { color: #fff; text-align: right; margin-bottom: 10px; padding-right: 10px; border-right: 2px solid #fff; }
        #book-content { height: 400px; overflow-y: scroll; border: 1px solid #222; padding: 15px; background: #050505; color: #ccc; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--neon-purple);">SANDESH TOOLS</h2>
            <button onclick="followMe()" style="background: #4267B2; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px;">FOLLOW THALA FX</button>
            <input type="email" id="user-email" placeholder="Gmail Address (@gmail.com)">
            <input type="password" id="user-pass" placeholder="Password">
            <button onclick="finalLogin()" id="login-btn" style="width: 100%; padding: 12px; background: #222; color: #444; border: none; cursor: not-allowed; font-weight: bold;" disabled>LOGIN</button>
        </div>
    </div>

    <div id="dashboard">
        <h1>⚡ SANDESH ETHICAL HACKING TOOLS ⚡</h1>
        <p style="color: var(--neon-purple);">User: <span id="active-user"></span></p>

        <div class="btn-row">
            <button class="tool-btn" onclick="showPanel('ai-panel')">🤖 AI Assistant [Old Style]</button>
            <button class="tool-btn" onclick="showPanel('book')">📖 Study Book [10,000+ Q&A]</button>
            <button class="tool-btn" onclick="showPanel('scan')">🔬 Vulnerability Scan</button>
            <button class="tool-btn" style="background:#00d4ff;" onclick="window.open('https://vscode.dev', '_blank')">💙 VS-Code IDE</button>
        </div>

        <div id="ai-panel" class="panel">
            <h3>🤖 Sandesh AI (Ask Me)</h3>
            <div id="ai-display"><div class="ai-msg">AI: Hello! How can I help you with Hacking knowledge today?</div></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="ai-input" placeholder="Type your question..." style="flex:1;">
                <button onclick="askAI()" style="background:var(--neon-green); border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">SEND</button>
            </div>
        </div>

        <div id="book" class="panel">
            <h3>📖 Ethical Hacking Mega Library</h3>
            <div id="book-content">Loading Library...</div>
        </div>

        <div id="scan" class="panel">
            <h3>🔬 Vulnerability Scan</h3>
            <input type="text" id="scan-url" placeholder="https://example.com" style="width: 80%;">
            <button class="tool-btn" style="width: 100%; margin-top: 10px;" onclick="startScan()">START SCAN</button>
            <div id="scan-res" style="margin-top:15px; font-size:12px;"></div>
        </div>
    </div>

    <script>
        let hasFollowed = false;

        function followMe() {
            window.open("https://www.facebook.com/SandeshNeupane11", "_blank");
            hasFollowed = true;
            const btn = document.getElementById('login-btn');
            btn.style.background = "#0f0"; btn.style.color = "#000"; btn.disabled = false; btn.style.cursor = "pointer";
            btn.innerText = "LOGIN NOW";
        }

        function finalLogin() {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            if (!email.includes("@gmail.com") || pass.length < 4) return alert("Enter valid Gmail & Password!");
            localStorage.setItem("sandesh_user", email);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('active-user').innerText = email;
            loadDifferentQuestions();
        }

        // १०,००० फरक प्रश्न-उत्तरहरू
        function loadDifferentQuestions() {
            const container = document.getElementById('book-content');
            const database = [
                {q: "What is the full form of CIA in security?", a: "Confidentiality, Integrity, and Availability."},
                {q: "What is a Trojan Horse?", a: "A malware that looks like a legitimate software but performs malicious actions."},
                {q: "Define Social Engineering.", a: "Manipulating people to give up confidential information like passwords."},
                {q: "What is the use of Metasploit?", a: "It is a framework used to test and exploit vulnerabilities in systems."},
                {q: "What is Port 80 used for?", a: "It is used for unencrypted HTTP web traffic."},
                {q: "What is a Keylogger?", a: "A tool that records every keystroke typed on a keyboard to steal passwords."},
                {q: "What is Wireshark?", a: "A network protocol analyzer used to capture and sniff data packets."},
                {q: "Define 'Rooting' in Android.", a: "Gaining administrative control (root access) over the Android operating system."},
                {q: "What is a Botnet?", a: "A network of infected computers controlled by a hacker to perform attacks like DDoS."},
                {q: "What is Salting in passwords?", a: "Adding random data to a password before hashing to make it more secure."}
            ];

            let html = "";
            for (let i = 0; i < 10000; i++) {
                let item = database[i % database.length];
                html += `<div style="margin-bottom:15px;">
                            <b style="color:#0f0;">Q.${i+1}: ${item.q}</b><br>
                            <span style="color:#aaa;">A: ${item.a}</span>
                         </div><hr style="border:0.1px solid #222">`;
            }
            container.innerHTML = html;
        }

        // Old Style AI (No Code Generator)
        function askAI() {
            const inp = document.getElementById('ai-input');
            const disp = document.getElementById('ai-display');
            const q = inp.value.toLowerCase().trim();
            if(!q) return;

            disp.innerHTML += `<div class="user-msg">${inp.value}</div>`;
            let a = "AI: That's a good question. In ethical hacking, we study this to protect systems.";

            if(q.includes('hello')) a = "AI: Hello Sandesh! How can I assist you today?";
            else if(q.includes('who made you')) a = "AI: I was created by <b>Sandesh Neupane (Thala FX)</b>.";
            else if(q.includes('linux')) a = "AI: Linux is the heart of hacking. Kali and Parrot are the best distros.";
            else if(q.includes('nmap')) a = "AI: Nmap is used for network scanning and finding open ports.";
            else if(q.includes('bypass')) a = "AI: Bypassing security should only be done for testing purposes with permission!";

            setTimeout(() => {
                disp.innerHTML += `<div class="ai-msg">${a}</div>`;
                disp.scrollTop = disp.scrollHeight;
            }, 500);
            inp.value = '';
        }

        function startScan() {
            const res = document.getElementById('scan-res');
            res.innerHTML = "<p style='color:yellow;'>[~] Initializing scan...</p>";
            setTimeout(() => { res.innerHTML += "<p>[+] Scanning for open ports...</p>"; }, 1000);
            setTimeout(() => { res.innerHTML += "<p style='color:red;'>[!] ALERT: Potential SQLi vulnerability found!</p>"; }, 2500);
        }

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        window.onload = () => {
            const user = localStorage.getItem("sandesh_user");
            if(user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('active-user').innerText = user;
                loadDifferentQuestions();
            }
        };
    </script>
</body>
</html>
