<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | 4K IPL Live</title>
    <style>
        :root { --accent: #00ffcc; --dark: #030712; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 15px; border-bottom: 1px solid #1f2937; background: #0b0f1a; }
        .brand { font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }

        /* Full Screen Responsive Player */
        .player-container { 
            width: 100%; 
            max-width: 1100px; 
            margin: 20px auto; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Quality Options on Right Down Side */
        .quality-pills { position: absolute; bottom: 15px; right: 15px; display: flex; gap: 8px; z-index: 10; }
        .pill { 
            background: rgba(0,0,0,0.7); 
            color: white; 
            border: 1px solid var(--accent); 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .pill.active { border-color: #ffc300; color: #ffc300; }

        .status { padding: 10px; color: #8f98b2; font-size: 14px; font-weight: bold; }
        .status span { color: #ff3b30; }
    </style>
</head>
<body>

<header>
    <div class="brand">AURALIVE.</div>
</header>

<div class="player-container">
    <iframe 
        id="main-player" 
        src="https://www.youtube.com/embed/live_stream?channel=UC4_XUuY6A1926-0eN3fU1hQ&autoplay=1&mute=1" 
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <div class="quality-pills">
        <div class="pill" onclick="location.reload()">720p HD</div>
        <div class="pill" onclick="location.reload()">1080p FHD</div>
        <div class="pill active" onclick="location.reload()">4K ULTRA</div>
    </div>
</div>

<div class="status">
    <span>● LIVE</span> | PBKS vs RR | Aura Engine v1.2
</div>

</body>
</html>
