<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA LIVE - IPL RCB vs GT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .player-container { max-width: 800px; margin: 80px auto 20px; background: #000; aspect-ratio: 16/9; border: 3px solid #2563eb; border-radius: 12px; overflow: hidden; }
        video { width: 100%; height: 100%; }
        .match-card { background: #1e293b; padding: 15px; margin: 10px auto; max-width: 800px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .btn-play { background: #ef4444; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full bg-slate-900 p-4 border-b border-slate-800 z-50">
        <h1 class="text-xl font-black text-blue-500">AURA LIVE</h1>
    </header>

    <div class="player-container">
        <!-- YoSinTV को लोगो यहाँ हटाइएको छ -->
        <video id="aura_player" controls playsinline poster="https://web.cricfoot.net/favico.png"></video>
    </div>

    <div class="px-4">
        <div class="bg-blue-600 text-center py-3 rounded-lg font-bold mb-5">IPL LIVE: RCB vs GT</div>
        <div id="match_box">
            <p class="text-center opacity-50">Searching for live signals...</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('aura_player');
        let hls = new Hls();

        // १. भिडियो चलाउने मुख्य फसन
        function startLive(url) {
            if (!url) return;
            console.log("Playing:", url);
            
            if (Hls.isSupported()) {
                hls.destroy(); // पुरानो स्ट्रिम सफा गर्ने
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
                video.play();
            }
        }

        // २. API बाट ताजा लिङ्क तान्ने
        async function getFreshMatches() {
            const box = document.getElementById('match_box');
            try {
                const response = await fetch('https://yosintv-api.pages.dev/api/cricket.json');
                const data = await response.json();
                const matches = data.matches || data;
                box.innerHTML = '';

                matches.forEach(m => {
                    box.innerHTML += `
                        <div class="match-card">
                            <div class="text-center">
                                <p class="font-bold">${m.team1}</p>
                                <img src="${m.team1_logo}" class="w-10 h-10 mx-auto">
                            </div>
                            <button onclick="startLive('${m.stream_url}')" class="btn-play">WATCH LIVE</button>
                            <div class="text-center">
                                <p class="font-bold">${m.team2}</p>
                                <img src="${m.team2_logo}" class="w-10 h-10 mx-auto">
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                box.innerHTML = "<p class='text-red-500 text-center'>Error connecting to server. Refresh page.</p>";
            }
        }

        // ३. पेज लोड हुँदा सुरु गर्ने
        window.onload = () => {
            getFreshMatches();
            // ब्याकअप लिङ्क सुरुमा लोड गर्ने
            startLive('https://linearjitp-pa.akamaized.net/node/astrop_v0/636/index.m3u8');
        };
    </script>
</body>
</html>
