<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Live - No Ads</title>
    <style>
        :root { --main-blue: #001d3d; --accent-gold: #ffc300; --pure-black: #050a14; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--pure-black); color: white; margin: 0; overflow-x: hidden; }
        
        /* Clean Header */
        header { background: var(--main-blue); padding: 15px; text-align: center; border-bottom: 3px solid var(--accent-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .live-label { background: red; color: white; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-left: 10px; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* Video Player Area (No Ads) */
        .player-wrapper { width: 100%; max-width: 900px; margin: auto; background: black; aspect-ratio: 16/9; position: relative; border-bottom: 2px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }

        .content { max-width: 500px; margin: auto; padding: 20px; }

        /* Smooth Match Cards */
        .match-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .match-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        
        .team-info { display: flex; flex-direction: column; align-items: center; width: 80px; }
        .logo { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; margin-bottom: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .vs { color: var(--accent-gold); font-weight: bold; font-size: 22px; font-style: italic; }
        
        .watch-btn { background: #ffc300; color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; }
        .status { font-size: 12px; color: #aaa; background: #1b263b; padding: 5px 12px; border-radius: 20px; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 22px; display: flex; align-items: center; justify-content: center;">
        🏏 IPL AD-FREE LIVE <span class="live-label">LIVE</span>
    </h1>
</header>

<div class="player-wrapper">
    <iframe src="https://www.youtube.com/embed/live_stream?channel=IPL_STREAM_ID" allowfullscreen></iframe>
</div>

<div class="content">
    <h3 style="color: var(--accent-gold); border-bottom: 1px solid #333; padding-bottom: 10px;">Day by Day Schedule</h3>

    <div style="font-size: 12px; color: #ffc300; margin-bottom: 8px; font-weight: bold;">TODAY'S BATTLE</div>
    <div class="match-card">
        <div class="team-info">
            <div class="logo" style="background: #ed1b24;">PBKS</div>
            <span>Kings</span>
        </div>
        <div class="vs">VS</div>
        <div class="team-info">
            <div class="logo" style="background: #254aa5;">RR</div>
            <span>Royals</span>
        </div>
        <button class="watch-btn" onclick="window.scrollTo(0,0)">WATCH</button>
    </div>

    <div style="font-size: 12px; color: #aaa; margin-bottom: 8px;">TOMORROW (APR 29)</div>
    <div class="match-card" style="opacity: 0.8;">
        <div class="team-info">
            <div class="logo" style="background: #004ba0;">MI</div>
            <span>Mumbai</span>
        </div>
        <div class="vs">VS</div>
        <div class="team-info">
            <div class="logo" style="background: #ff822a;">SRH</div>
            <span>Hyderabad</span>
        </div>
        <span class="status">7:30 PM</span>
    </div>

    <div style="font-size: 12px; color: #aaa; margin-bottom: 8px;">THURSDAY (APR 30)</div>
    <div class="match-card" style="opacity: 0.6;">
        <div class="team-info">
            <div class="logo" style="background: #cf1020;">RCB</div>
            <span>Bangalore</span>
        </div>
        <div class="vs">VS</div>
        <div class="team-info">
            <div class="logo" style="background: #00008b;">DC</div>
            <span>Delhi</span>
        </div>
        <span class="status">7:30 PM</span>
    </div>
</div>

</body>
</html>
