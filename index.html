<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | Yoshin 4K Engine</title>
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        header { padding: 15px; border-bottom: 2px solid #00ffcc; background: #0f172a; }
        .brand { font-size: 24px; font-weight: 900; color: #00ffcc; text-transform: uppercase; }

        /* Full Screen Unblocked Player */
        .player-wrapper { 
            width: 100%; 
            max-width: 1000px; 
            margin: 20px auto; 
            aspect-ratio: 16/9; 
            background: #000; 
            border: 1px solid #1e293b;
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-container { margin: 20px; }
        .direct-btn {
            background: #00ffcc; color: black; padding: 12px 25px; 
            text-decoration: none; border-radius: 8px; font-weight: bold;
            display: inline-block; transition: 0.3s;
        }
        .direct-btn:hover { background: #3b82f6; color: white; }

        .live-tag { color: #ff3b30; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
    </style>
</head>
<body>

<header><div class="brand">AURALIVE.</div></header>

<div class="player-wrapper">
    <iframe 
        src="https://yoshintv.com/live/ipl-live-stream-1/" 
        allow="autoplay; encrypted-media; fullscreen" 
        allowfullscreen>
    </iframe>
</div>

<div class="btn-container">
    <span class="live-tag">● LIVE: PBKS VS RR</span>
    <p style="font-size: 14px; color: #94a3b8;">If the player above shows error, click below:</p>
    <a href="https://yoshintv.com/live/ipl-live-stream-1/" target="_blank" class="direct-btn">
        OPEN IN YOSHIN PLAYER
    </a>
</div>

<footer style="margin-top: 20px; font-size: 11px; color: #475569;">
    Aura Engine v9.0 | Yoshin TV Network
</footer>

</body>
</html>
