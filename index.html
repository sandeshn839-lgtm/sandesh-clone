<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | 4K Unblocked</title>
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #00ffcc; background: #0f172a; }
        .brand { font-size: 28px; font-weight: 900; color: #00ffcc; letter-spacing: 2px; }
        
        .main-container { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        /* High Performance Watch Button */
        .watch-now-btn {
            background: linear-gradient(45deg, #00ffcc, #3b82f6);
            color: #000;
            padding: 20px 50px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            transition: 0.3s ease;
            cursor: pointer;
            text-transform: uppercase;
        }
        .watch-now-btn:hover { transform: scale(1.1); box-shadow: 0 0 60px rgba(0, 255, 204, 0.8); }

        .info-card { margin-top: 40px; background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; max-width: 450px; }
        .live-dot { color: #ff3b30; animation: blink 1s infinite; font-size: 20px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.2;} 100% {opacity:1;} }
    </style>
</head>
<body>

<header><div class="brand">AURALIVE.</div></header>

<div class="main-container">
    <div style="margin-bottom: 30px;">
        <span class="live-dot">●</span> <b style="font-size: 22px;">LIVE: PBKS VS RR (YOSHIN ENGINE)</b>
    </div>

    <a href="https://yoshintv.com/live/ipl-live-stream-1/" target="_blank" class="watch-now-btn">
        START WATCHING LIVE 4K
    </a>

    <div class="info-card">
        <p style="margin: 0; color: #00ffcc; font-weight: bold;">SERVER: YOSHIN TV ACTIVE ✅</p>
        <p style="font-size: 14px; color: #94a3b8; margin-top: 15px;">
            YouTube has blocked the player. <b>Click the button above</b> to open the stream in a new tab. It is much faster and will not show any errors.
        </p>
    </div>
</div>

<footer style="margin-top: 20px; font-size: 11px; color: #475569;">
    Aura Engine v6.0 | Yoshin TV Integration
</footer>

</body>
</html>
