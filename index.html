<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA LIVE - Nepal vs UAE Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .aura-player-frame { 
            max-width: 900px; margin: 80px auto 20px; 
            background: #000; aspect-ratio: 16/9; 
            border: 3px solid #2563eb; border-radius: 15px; 
            overflow: hidden; box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }
        video { width: 100%; height: 100%; }
        .match-card { 
            background: #1e293b; padding: 20px; margin: 15px auto; 
            max-width: 850px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid #334155; 
        }
        .btn-watch { 
            background: #ef4444; color: white; padding: 12px 25px; 
            border-radius: 50px; font-weight: 900; font-size: 14px; 
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full bg-slate-900 p-4 border-b border-slate-800 z-50">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter">AURA LIVE</h1>
    </header>

    <div class="aura-player-frame">
        <!-- YoSinTV को लोगो यहाँ हटाइएको छ -->
        <video id="aura_player" controls poster="https://web.cricfoot.net/favico.png"></video>
    </div>

    <div class="px-4">
        <div class="bg-gradient-to-r from-red-600 to-blue-700 text-center py-4 rounded-xl font-black text-xl mb-6 shadow-lg">
            NEPAL vs UAE: LIVE STREAMING
        </div>

        <div id="nepal_match">
            <div class="match-card">
                <div class="text-center flex-1">
                    <p class="font-black text-lg">NEPAL</p>
                    <img src="https://flagcdn.com/w160/np.png" class="w-16 h-auto mx-auto mt-2 shadow-md">
                </div>
                
                <div class="flex flex-col items-center px-4">
                    <span class="text-[10px] font-bold text-blue-400 mb-2">LIVE NOW</span>
                    <!-- यो बटन थिचेपछि म्याच सुरु हुन्छ -->
                    <button onclick="playNepal('https://linearjitp-pa.akamaized.net/node/astrop_v0/636/index.m3u8')" class="btn-watch">WATCH HD</button>
                </div>

                <div class="text-center flex-1">
                    <p class="font-black text-lg">UAE</p>
                    <img src="https://flagcdn.com/w160/ae.png" class="w-16 h-auto mx-auto mt-2 shadow-md">
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('aura_player');
        
        function playNepal(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            // म्याचको डिफल्ट लिङ्क लोड गर्ने
            playNepal('https://linearjitp-pa.akamaized.net/node/astrop_v0/636/index.m3u8');
        };
    </script>

    <footer class="text-center py-10 opacity-20 text-[10px]">
        © 2026 AURA LIVE | NEPAL CRICKET SPECIAL
    </footer>

</body>
</html>
