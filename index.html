<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandesh Ethical Hacking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #000000;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Login Container Setup */
        .login-box {
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #bc13fe;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
        }

        h2 {
            color: #bc13fe;
            font-size: 24px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #bc13fe;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: #050505;
            border: 1px solid #00ff00;
            border-radius: 8px;
            color: #00ff00;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #bc13fe;
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
        }

        /* Placeholder Color */
        ::placeholder {
            color: rgba(0, 255, 0, 0.5);
        }

        /* Launch Button styling */
        .launch-btn {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 5px;
            color: #555;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        /* Active state when credentials look ready */
        .launch-btn.active {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            cursor: pointer;
        }

        .launch-btn.active:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 25px #00ff00;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>SANDESH TOOLS</h2>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Sandesh99998@gmail.com" oninput="checkInputs()">
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" oninput="checkInputs()">
        </div>
        
        <button id="launchBtn" onclick="launchSystem()" class="launch-btn" disabled>LAUNCH_SYSTEM</button>
    </div>

    <script>
        // Inputs चेक गर्ने र बटन अन गर्ने फङ्सन
        function checkInputs() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const launchBtn = document.getElementById('launchBtn');

            // यदि इमेल र पासवर्ड खाली छैन भने बटन एक्टिभ गर्ने
            if (email.trim() !== "" && password.trim() !== "") {
                launchBtn.removeAttribute('disabled');
                launchBtn.classList.add('active');
            } else {
                launchBtn.setAttribute('disabled', 'true');
                launchBtn.classList.remove('active');
            }
        }

        // सिस्टम लन्च गर्ने फङ्सन
        function launchSystem() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // यहाँ तिम्रो सिस्टम भित्र छिर्ने कोड राख्न सक्छौ
            alert("Access Granted! Launching Sandesh Core System...");
            
            // उदाहरणका लागि मेन ड्यासबोर्डमा पठाउने लिंक:
            // window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
