<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | Direct Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 20px; background: #0f172a; border-bottom: 2px solid #00ffcc; color: #00ffcc; font-size: 24px; font-weight: bold; }
        .video-box { width: 100%; max-width: 850px; margin: 20px auto; aspect-ratio: 16/9; background: #000; box-shadow: 0 0 30px rgba(0,255,204,0.3); }
        video { width: 100%; height: 100%; }
        .status { color: #94a3b8; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">AURALIVE PRO</div>

<div class="video-box">
    <video id="video" controls autoplay></video>
</div>

<div class="status">
    <b>Status:</b> Direct .m3u8 Server Connected ✅
</div>

<script>
  var video = document.getElementById('video');
  
  // मलाई 'Donkey' नभन है, यो हो लाइभ .m3u8 लिङ्क:
  var videoSrc = 'https://linearjitp-pa.akamaized.net/node/astrop_v0/636/index.m3u8';

  if (Hls.isSupported()) {
    var hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play();
    });
  } 
  else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari ब्राउजरको लागि
    video.src = videoSrc;
    video.addEventListener('loadedmetadata', function() {
      video.play();
    });
  }
</script>

</body>
</html>
