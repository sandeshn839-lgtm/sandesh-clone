<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | IPL Multi-Server</title>
    <style>
        body { background: #030712; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 15px; border-bottom: 2px solid #00ffcc; background: #0b0f1a; }
        .brand { font-size: 24px; font-weight: 900; color: #00ffcc; }
        .player-box { width: 100%; max-width: 1000px; margin: 10px auto; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .server-list { margin: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .s-btn { background: #1f2937; color: white; border: 1px solid #334155; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .s-btn:hover { background: #00ffcc; color: black; }
        .live-dot { color: #ff3b30; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
    </style>
</head>
<body>

<header><div class="brand">AURALIVE.</div></header>

<div class="player-box">
    <iframe id="main-iframe" src="https://www.youtube.com/embed/live_stream?channel=UC4_XUuY6A1926-0eN3fU1hQ" allowfullscreen></iframe>
</div>

<div class="server-list">
    <button class="s-btn" onclick="changeServer('https://www.youtube.com/embed/live_stream?channel=UC4_XUuY6A1926-0eN3fU1hQ')">Server 1 (Main)</button>
    <button class="s-btn" onclick="changeServer('https://www.youtube.com/embed/live_stream?channel=UC_7N7-1VlqL3T18x1_R9U_g')">Server 2 (Backup)</button>
    <button class="s-btn" onclick="changeServer('https://www.youtube.com/embed/jfKfPfyJRdk')">Server 3 (Direct)</button>
</div>

<div style="padding:10px;">
    <span class="live-dot">●</span> LIVE: PBKS vs RR
</div>

<script>
    function changeServer(url) {
        document.getElementById('main-iframe').src = url + "?autoplay=1&mute=1";
    }
</script>

</body>
</html>
