<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL LIVE - No Ads</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { background: #001d3d; padding: 15px; border-bottom: 3px solid #ffc300; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; }
        #match-timer { padding: 20px; font-size: 20px; color: #ffc300; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">🏏 IPL LIVE PORTAL</h2>
</header>

<div class="video-box">
    <iframe id="main-player" src="https://www.youtube.com/embed/live_stream?channel=UC4_XUuY6A1926-0eN3fU1hQ" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
</div>

<div id="match-timer">Loading Countdown...</div>

<script>
    function startTimer() {
        const matchStart = new Date("April 28, 2026 19:15:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = matchStart - now;
            if (diff > 0) {
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById("match-timer").innerHTML = "Match Starts In: " + h + "h " + m + "m " + s + "s";
            } else {
                document.getElementById("match-timer").innerHTML = "● LIVE NOW: KINGS vs ROYALS";
                document.getElementById("match-timer").style.color = "red";
                // Auto-play command
                document.getElementById("main-player").src += "&autoplay=1&mute=1";
            }
        }, 1000);
    }
    startTimer();
</script>

</body>
</html>
