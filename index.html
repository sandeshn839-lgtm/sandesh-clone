<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical Hacking Learning Tools</title>
    <style>
        /* CSS Styling - 1766.jpg मा आधारित */
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #0f0; text-shadow: 0 0 10px #0f0; }
        .warning {
            background: #f44336; color: white; padding: 15px;
            margin: 20px auto; max-width: 600px; border-radius: 5px;
        }
        .button-group {
            margin: 20px auto; max-width: 650px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        button {
            background-color: #0f0; border: none; border-radius: 15px;
            padding: 15px 25px; font-weight: bold; cursor: pointer;
            min-width: 120px; box-shadow: 0 0 8px #0f0; transition: 0.3s;
        }
        button:hover { filter: brightness(120%); transform: scale(1.05); }
        button.more { background-color: #cc00ff; color: white; }

        #toolsSection {
            margin: 40px auto; max-width: 800px; text-align: left;
            border: 1px solid #0f0; border-radius: 10px; padding: 20px;
            background-color: #111; display: none; /* सुरुमा लुकेको हुन्छ */
        }
        .tool-item { margin-bottom: 10px; list-style: none; color: #0f0; }
        #bookIcon {
            font-size: 2.5rem; cursor: pointer; display: inline-block;
            margin-top: 40px; transition: 0.3s;
        }
        #bookIcon:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <h1>🛡️ ETHICAL HACKING LEARNING TOOLS 🛡️</h1>
    <p>50+ Kali Linux Tools | Mobile Ready</p>

    <div class="warning">
        ⚠️ <strong>LEGAL:</strong> Educational only. Get written permission.
    </div>

    <!-- Buttons Section - 1767.jpg मा आधारित -->
    <div class="button-group">
        <button onclick="showTools('Recon')">🔍 Recon</button>
        <button onclick="showTools('Scan')">📡 Scan</button>
        <button onclick="showTools('Exploits')">💥 Exploits</button>
        <button onclick="showTools('Post')">🔐 Post</button>
        <button onclick="showTools('WiFi')">📶 WiFi</button>
        <button onclick="showTools('Web')">🌐 Web</button>
        <button onclick="showTools('Pass')">🔑 Pass</button>
        <button class="more" onclick="showTools('More')">⚙️ More</button>
    </div>

    <!-- Results Section -->
    <div id="toolsSection">
        <h2 id="categoryTitle" style="color: #cc00ff; text-align: center;"></h2>
        <div id="toolsContent"></div>
    </div>

    <!-- FAQ Icon -->
    <div id="bookIcon" title="Ethical Hacking FAQ" onclick="openFAQ()">📖</div>

    <script>
        // Data - 1768.jpg मा आधारित
        const toolsData = {
            'Recon': ['Nmap - Network scanner', 'Maltego - Link analysis tool', 'Recon-ng - Web reconnaissance framework'],
            'Scan': ['OpenVAS - Vulnerability scanner', 'Nikto - Web server scanner', 'Nessus - Vulnerability assessment'],
            'Exploits': ['Metasploit Framework', 'Sqlmap - SQL injection tool', 'BeEF - Browser exploitation'],
            'Post': ['PowerSploit - Post exploitation', 'Empire - PowerShell agent', 'Responder - LLMNR poisoning'],
            'WiFi': ['Aircrack-ng', 'Wifite - Automated attack tool', 'Reaver - WPS attack tool'],
            'Web': ['Burp Suite', 'OWASP ZAP', 'W3af - Web audit framework'],
            'Pass': ['John the Ripper', 'Hashcat', 'Hydra - Network logon cracker'],
            'More': ['Netcat - Networking utility', 'Tcpdump - Packet analyzer', 'Wireshark - Protocol analyzer']
        };

        // बटन थिच्दा डाटा देखाउने फंसन
        function showTools(category) {
            const section = document.getElementById('toolsSection');
            const title = document.getElementById('categoryTitle');
            const content = document.getElementById('toolsContent');

            title.innerText = category + " Tools";
            content.innerHTML = ""; // पुरानो डाटा हटाउने

            const list = document.createElement('ul');
            toolsData[category].forEach(tool => {
                const li = document.createElement('li');
                li.className = "tool-item";
                li.innerText = "✔️ " + tool;
                list.appendChild(li);
            });

            content.appendChild(list);
            section.style.display = "block"; // सेक्सन देखाउने
            section.scrollIntoView({ behavior: 'smooth' }); // त्यहाँ गुडाउने
        }

        // FAQ पेज खोल्ने फंसन
        function openFAQ() {
            // यो फाइल तपाईंको फोल्डरमा हुन जरुरी छ
            window.open('ethical_hacking_faq.html', '_blank');
        }
    </script>

</body>
</html>
