<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | Real-Time Live Score</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 15px; background: #0f172a; border-bottom: 2px solid #00ffcc; }
        .logo { font-size: 24px; font-weight: 900; color: #00ffcc; letter-spacing: 2px; }

        /* Real Video Player */
        .player-container { width: 100%; max-width: 900px; margin: 10px auto; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Real-Time Score Widget Container */
        .score-widget { width: 100%; max-width: 900px; margin: 20px auto; min-height: 200px; }
    </style>
</head>
<body>

<header><div class="logo">AURALIVE.</div></header>

<div class="player-container">
    <iframe src="https://yoshintv.com/live/ipl-live-stream-1/" allowfullscreen></iframe>
</div>

<div class="score-widget">
    <h3 style="color: #00ffcc;">LIVE SCOREBOARD</h3>
    <iframe src="https://www.cricket.com.au/matches" style="width:100%; height:500px; border:none; border-radius:12px; background:white;"></iframe>
</div>

<p style="font-size: 12px; color: #475569;">Data syncs every 30 seconds</p>

</body>
</html>
