<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JioHotstar - IPL Live Video</title>
    <style>
        :root { --jio-dark: #0f1014; --jio-blue: #1f80e0; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--jio-dark); color: var(--text); margin: 0; padding: 0; }
        
        /* JioHotstar Style Header */
        header { background: rgba(15, 16, 20, 0.95); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #252833; }
        .logo { font-size: 18px; font-weight: bold; color: var(--jio-blue); }
        .live-btn { background: #e50914; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Full Width Player */
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .container { padding: 15px; max-width: 800px; margin: auto; }
        .match-desc { margin-top: 15px; border-bottom: 1px solid #252833; padding-bottom: 15px; }
        .match-desc h2 { font-size: 20px; margin: 0; }

        /* Day by Day Schedule */
        .schedule-title { font-size: 14px; color: #8f98b2; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .match-row { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .match-card { min-width: 160px; background: #16181f; border-radius: 8px; padding: 12px; border: 1px solid #252833; }
        .team { font-weight: bold; font-size: 14px; margin: 5px 0; }
        .time { font-size: 12px; color: var(--jio-blue); }
    </style>
</head>
<body>

<header>
    <div class="logo">JioHotstar <span style="color:white; font-weight:normal;">IPL</span></div>
    <div class="live-btn">LIVE</div>
</header>

<div class="video-wrapper">
    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4_XUuY6A1926-0eN3fU1hQ" allowfullscreen></iframe>
</div>

<div class="container">
    <div class="match-desc">
        <h2>Kings vs Royals</h2>
        <p style="color: #8f98b2; font-size: 14px;">IPL 2026 • Live from Wankhede Stadium</p>
    </div>

    <div class="schedule-title">Day by Day Matches</div>
    <div class="match-row">
        <div class="match-card">
            <div class="time">Today, 7:30 PM</div>
            <div class="team">PBKS</div>
            <div style="font-size: 10px; color: gray;">vs</div>
            <div class="team">RR</div>
        </div>
        <div class="match-card" style="opacity: 0.7;">
            <div class="time">Tomorrow</div>
            <div class="team">MI</div>
            <div style="font-size: 10px; color: gray;">vs</div>
            <div class="team">SRH</div>
        </div>
        <div class="match-card" style="opacity: 0.7;">
            <div class="time">Wednesday</div>
            <div class="team">RCB</div>
            <div style="font-size: 10px; color: gray;">vs</div>
            <div class="team">DC</div>
        </div>
    </div>
</div>

</body>
</html>
