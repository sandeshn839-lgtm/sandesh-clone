<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Connect</title>
    <style>
        body { font-family: Segoe UI, Helvetica, Arial, sans-serif; background-color: #f0f2f5; margin: 0; }
        
        /* Navbar */
        .navbar { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .nav-icons { display: flex; gap: 20px; color: #65676b; font-size: 20px; }

        .container { max-width: 500px; margin: auto; padding: 10px; }

        /* Story Section */
        .story-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .story-card { min-width: 110px; height: 180px; background: #ddd; border-radius: 12px; position: relative; overflow: hidden; background-size: cover; background-position: center; }
        .story-name { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 12px; font-weight: bold; }
        .story-pic { position: absolute; top: 10px; left: 10px; width: 35px; height: 35px; border: 3px solid #0084ff; border-radius: 50%; }

        /* Post Creation Box */
        .create-post { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .create-input { background: #f0f2f5; padding: 10px; border-radius: 20px; color: #65676b; cursor: pointer; }

        /* Post Feed */
        .post { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .user-img { width: 40px; height: 40px; border-radius: 50%; background: #ddd; }
        .post-img { width: 100%; border-radius: 8px; margin-top: 10px; }

        /* Blue Tick */
        .blue-tick { width: 16px; height: 16px; background: #0084ff; color: white; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="color: #0084ff; font-size: 24px; font-weight: bold;">S-Connect</div>
    <div class="nav-icons">
        <span>➕</span> <span>🔍</span> <span>💬</span>
    </div>
</div>

<div class="container">
    <div class="create-post">
        <div style="display: flex; gap: 10px; align-items: center;">
            <div class="user-img"></div>
            <div class="create-input" style="flex: 1;">What's on your mind, Sandesh?</div>
        </div>
    </div>

    <div class="story-container">
        <div class="story-card" style="background-image: url('https://via.placeholder.com/110x180');">
            <div class="story-pic" style="background: #0084ff; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">+</div>
            <div class="story-name">Create story</div>
        </div>
        <div class="story-card" style="background-image: url('https://via.placeholder.com/110x180/ff7f50');">
            <div class="story-pic"></div>
            <div class="story-name">Jyoti Bhusal</div>
        </div>
        <div class="story-card" style="background-image: url('https://via.placeholder.com/110x180/87cefa');">
            <div class="story-pic"></div>
            <div class="story-name">Muna Parajuli</div>
        </div>
    </div>

    <div class="post">
        <div class="post-header">
            <div class="user-img"></div>
            <div>
                <div style="font-weight: bold;">Sandesh Neupane <span class="blue-tick">✓</span></div>
                <div style="font-size: 12px; color: #65676b;">2h • 🌎</div>
            </div>
        </div>
        <div class="post-content">
            मेरो नयाँ फेसबुक क्लोन प्रोजेक्ट कस्तो छ? अब यसमा Stories र Posts सबै हेर्न मिल्छ!
        </div>
        <img src="https://via.placeholder.com/500x300" class="post-img">
    </div>
</div>

</body>
</html>
