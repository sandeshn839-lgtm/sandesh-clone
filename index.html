<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | IPL 4K Live</title>
    <style>
        body { background: #030712; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #00ffcc; background: #0b0f1a; }
        .brand { font-size: 26px; font-weight: 900; color: #00ffcc; letter-spacing: 2px; }
        .main-box { padding: 50px 20px; height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Premium Watch Button */
        .watch-btn {
            background: linear-gradient(45deg, #00ffcc, #3b82f6);
            color: black;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .watch-btn:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(0, 255, 204, 0.6); }
        
        .status { margin-top: 30px; font-size: 14px; color: #8f98b2; }
        .live-dot { color: #ff3b30; animation: blink 1s infinite; font-size: 18px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.2;} 100% {opacity:1;} }
    </style>
</head>
<body>

<header><div class="brand">AURALIVE.</div></header>

<div class="main-box">
    <div style="margin-bottom: 20px;">
        <span class="live-dot">●</span> <b>LIVE NOW: PBKS VS RR</b>
    </div>
    
    <a href="https://v3.sportshub.stream/" target="_blank" class="watch-btn">
        WATCH IN 4K ULTRA HD
    </a>

    <div class="status">
        Server Status: Online ✅ | Quality: 1080p/4K <br>
        <small>(Click the button to open the secure player)</small>
    </div>
</div>

<footer style="padding: 20px; font-size: 12px; color: #334155;">
    Aura Engine v2.0 - Encrypted Stream
</footer>

</body>
</html>
