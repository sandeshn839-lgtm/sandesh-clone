<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLive | 4K Yoshin Engine</title>
    <style>
        :root { --accent: #00ffcc; --dark: #020617; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 15px; border-bottom: 2px solid var(--accent); background: #0f172a; }
        .brand { font-size: 24px; font-weight: 900; color: var(--accent); text-transform: uppercase; }

        /* Full Screen Pro Player */
        .video-container { 
            width: 100%; 
            max-width: 1100px; 
            margin: 20px auto; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Quality & Full Screen Controls (Right Down Side) */
        .player-controls { position: absolute; bottom: 15px; right: 15px; display: flex; gap: 8px; z-index: 10; }
        .pill { 
            background: rgba(0,0,0,0.8); 
            color: white; 
            border: 1px solid var(--accent); 
            padding: 6px 15px; 
            border-radius: 50px; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .pill:hover { background: var(--accent); color: #000; }

        .live-status { padding: 10px; color: #94a3b8; font-weight: bold; font-size: 14px; }
        .dot { color: #ff3b30; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.2;} 100% {opacity:1;} }
    </style>
</head>
<body>

<header>
    <div class="brand">AURALIVE.</div>
</header>

<div class="video-container">
    <iframe 
        id="yoshin-stream" 
        src="https://yoshintv.com/live/ipl-live-stream-1/" 
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <div class="player-controls">
        <div class="pill" onclick="location.reload()">1080p HD</div>
        <div class="pill" onclick="location.reload()" style="border-color:#ffc300; color:#ffc300;">4K ULTRA</div>
    </div>
</div>

<div class="live-status">
    <span class="dot">●</span> LIVE: PBKS VS RR | Powered by Yoshin Engine
</div>

<div style="margin-top: 10px;">
    <p style="font-size: 12px; color: #475569;">If player doesn't load, <a href="https://yoshintv.com/" target="_blank" style="color: var(--accent);">click here</a> to open Yoshin TV directly.</p>
</div>

</body>
</html>
