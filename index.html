<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Connect Lite</title>
    <style>
        :root { --fb-blue: #3b5998; --bg: #cfd8dc; --white: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }

        /* Header & Icons */
        .header { background: var(--white); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .logo { color: var(--fb-blue); font-size: 22px; font-weight: bold; }
        .msg-icon { font-size: 24px; cursor: pointer; position: relative; }
        .badge { background: red; color: white; border-radius: 50%; padding: 2px 5px; font-size: 10px; position: absolute; top: -5px; right: -10px; }

        /* Tabs */
        .tabs { display: flex; background: var(--white); border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 20px; color: #606770; cursor: pointer; }
        .tab.active { color: var(--fb-blue); border-bottom: 3px solid var(--fb-blue); }

        /* Sections */
        .section { display: none; max-width: 500px; margin: auto; }
        #home-page { display: block; }

        /* Messenger Style */
        .messenger-container { background: white; height: 100vh; display: flex; flex-direction: column; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .chat-item:hover { background: #f5f5f5; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #ddd; margin-right: 15px; }

        /* Post & Scroll */
        .post { background: white; margin-top: 8px; padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .photo-scroll { display: flex; overflow-x: auto; gap: 5px; scroll-snap-type: x mandatory; margin-top: 10px; }
        .photo-scroll img { width: 100%; flex-shrink: 0; scroll-snap-align: start; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="app-ui">
        <div class="header">
            <div class="logo">S-Connect</div>
            <div class="msg-icon" onclick="goToMessenger()">💬<span class="badge">5</span></div>
        </div>

        <div class="tabs">
            <div class="tab active" id="t-home" onclick="showPage('home')">🏠</div>
            <div class="tab" onclick="alert('Friends')">👥</div>
            <div class="tab" id="t-reels" onclick="showPage('reels')">🎬</div>
            <div class="tab" id="t-profile" onclick="showPage('profile')">👤</div>
        </div>

        <div id="home-page" class="section">
            <div class="post">
                <b>Sandesh Neupane ✓</b>
                <p>फेसबुक लाइट जस्तै फोटो स्क्रोलिङ यहाँ छ!</p>
                <div class="photo-scroll">
                    <img src="https://picsum.photos/seed/1/400/300">
                    <img src="https://picsum.photos/seed/2/400/300">
                </div>
            </div>
        </div>

        <div id="reels-page" class="section">
            <div style="height: 80vh; background: black; display: flex; align-items: center; justify-content: center; color: white;">
                🎬 Infinite Reels Loading...
            </div>
        </div>

        <div id="profile-page" class="section" style="background: white; text-align: center; padding-bottom: 20px;">
            <div style="height: 150px; background: var(--fb-blue);"></div>
            <h2 style="margin-top: 20px;">Sandesh Neupane</h2>
            <p style="color: gray;">Digital Creator</p>
            <button style="padding: 10px 20px; background: #e4e6eb; border: none; border-radius: 5px; font-weight: bold;">Edit Profile</button>
        </div>
    </div>

    <div id="messenger-page" class="section" style="display: none; background: white; height: 100vh;">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <span onclick="goBack()" style="font-size: 20px; cursor: pointer;">⬅️</span>
                <b style="font-size: 20px;">Chats</b>
            </div>
            <span style="font-size: 20px;">📝</span>
        </div>
        <div class="messenger-container">
            <div class="chat-item" onclick="alert('Chat with Durga Neupane')">
                <div class="avatar"></div>
                <div><b>Durga Neupane</b><br><small style="color: gray;">Active 5m ago</small></div>
            </div>
            <div class="chat-item">
                <div class="avatar"></div>
                <div><b>S-Connect User</b><br><small style="color: gray;">You: Hello!</small></div>
            </div>
        </div>
    </div>

    <script>
        function showPage(page) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(page + '-page').style.display = 'block';
            document.getElementById('app-ui').style.display = 'block';
            document.getElementById('messenger-page').style.display = 'none';

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if(document.getElementById('t-' + page)) document.getElementById('t-' + page).classList.add('active');
        }

        function goToMessenger() {
            document.getElementById('app-ui').style.display = 'none';
            document.getElementById('messenger-page').style.display = 'block';
        }

        function goBack() {
            showPage('home');
        }
    </script>
</body>
</html>
