<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sandesh Hacker AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:black;
color:#00ff88;
overflow:hidden;
}

/* MATRIX */

canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}

/* LOGIN SCREEN */

#loginScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.loginBox{
width:350px;
padding:30px;
border:1px solid #00ff88;
box-shadow:0 0 30px #00ff88;
text-align:center;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
}

.loginTitle{
font-size:28px;
margin-bottom:20px;
text-shadow:0 0 20px #00ff88;
}

.face{
width:120px;
height:120px;
border-radius:50%;
border:2px solid #00ff88;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
box-shadow:0 0 25px #00ff88;
animation:pulse 2s infinite;
margin-bottom:20px;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

/* FINGERPRINT */

.fingerprint{
width:100px;
height:100px;
margin:auto;
cursor:pointer;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
border:2px solid #00ff88;
box-shadow:0 0 20px #00ff88;
transition:0.3s;
font-size:50px;
margin-top:20px;
}

.fingerprint:hover{
background:#00ff88;
color:black;
transform:scale(1.1);
}

.scanText{
margin-top:15px;
font-size:14px;
animation:blink 1s infinite;
}

@keyframes blink{

50%{
opacity:0.5;
}

}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:rgba(0,0,0,0.7);
border-bottom:1px solid #00ff88;
z-index:1000;
display:none;
}

.logo{
font-size:24px;
text-shadow:0 0 20px #00ff88;
}

.status{
padding:8px 15px;
border:1px solid #00ff88;
box-shadow:0 0 15px #00ff88;
animation:blink 1s infinite;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:70px;
left:0;
width:250px;
height:100%;
background:rgba(0,0,0,0.85);
border-right:1px solid #00ff88;
padding:20px;
display:none;
}

.sidebar button{
width:100%;
padding:14px;
margin-bottom:12px;
background:black;
color:#00ff88;
border:1px solid #00ff88;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

.sidebar button:hover{
background:#00ff88;
color:black;
box-shadow:0 0 20px #00ff88;
}

/* MAIN */

.main{
margin-left:260px;
margin-top:80px;
padding:20px;
display:none;
height:calc(100vh - 80px);
overflow:auto;
}

/* CARDS */

.card{
background:rgba(0,0,0,0.7);
border:1px solid #00ff88;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,255,136,0.2);
}

.card h2{
margin-bottom:15px;
text-shadow:0 0 15px #00ff88;
}

/* CHAT */

#chat{
height:300px;
overflow:auto;
background:black;
border:1px solid #00ff88;
padding:10px;
margin-bottom:10px;
}

.user{
color:#00ffff;
margin-bottom:10px;
}

.ai{
color:#00ff88;
margin-bottom:10px;
}

/* INPUT */

input{
width:100%;
padding:14px;
background:black;
border:1px solid #00ff88;
color:#00ff88;
margin-bottom:10px;
}

/* BUTTON */

.action{
padding:12px 20px;
background:black;
border:1px solid #00ff88;
color:#00ff88;
cursor:pointer;
margin:5px;
transition:0.3s;
}

.action:hover{
background:#00ff88;
color:black;
box-shadow:0 0 20px #00ff88;
}

/* TERMINAL */

.terminal{
height:220px;
overflow:auto;
background:black;
padding:10px;
border:1px solid #00ff88;
font-size:14px;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none !important;
}

.main{
margin-left:0;
}

}

</style>
</head>

<body>

<!-- MATRIX -->

<canvas id="matrix"></canvas>

<!-- LOGIN -->

<div id="loginScreen">

<div class="loginBox">

<div class="loginTitle">
SANDESH AI SECURITY
</div>

<div class="face">
🧑
</div>

<div class="scanText">
Biometric Security System
</div>

<div
class="fingerprint"
onclick="unlockSystem()"
>
🔒
</div>

<div class="scanText">
Touch Fingerprint To Unlock
</div>

</div>

</div>

<!-- HEADER -->

<div class="header" id="header">

<div class="logo">
⚡ SANDESH AI CYBER SYSTEM
</div>

<div class="status">
SECURED
</div>

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<button>🏠 Dashboard</button>

<button>🤖 AI Assistant</button>

<button>⚡ Terminal</button>

<button>📚 Learning</button>

<button>🔐 Security</button>

<button>🛡 Cyber Lab</button>

<button>⚙ Settings</button>

</div>

<!-- MAIN -->

<div class="main" id="main">

<!-- AI -->

<div class="card">

<h2>🤖 AI ASSISTANT</h2>

<div id="chat">

<p class="ai">
<b>AI:</b>
Welcome Sandesh. Secure access granted.
</p>

</div>

<input
type="text"
id="input"
placeholder="Ask AI anything..."
>

<button
class="action"
onclick="sendMessage()"
>
SEND
</button>

<button
class="action"
onclick="voiceAI()"
>
🎤 VOICE
</button>

</div>

<!-- TERMINAL -->

<div class="card">

<h2>⚡ TERMINAL</h2>

<div
class="terminal"
id="terminal"
>

<p>[+] Secure system initialized...</p>

</div>

<button
class="action"
onclick="fakeScan()"
>
RUN SCAN
</button>

</div>

</div>

<script>

/* MATRIX */

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const letters =
"アカサタナハマヤラワ0123456789";

const fontSize = 14;

const columns =
canvas.width/fontSize;

const drops=[];

for(let i=0;i<columns;i++)
drops[i]=1;

function draw(){

ctx.fillStyle=
"rgba(0,0,0,0.05)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="#00ff88";

ctx.font=
fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text =
letters[
Math.floor(
Math.random()*letters.length
)
];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize >
canvas.height
&& Math.random()>0.975
){
drops[i]=0;
}

drops[i]++;
}
}

setInterval(draw,35);

/* FINGERPRINT LOGIN */

function unlockSystem(){

const finger =
document.querySelector(
".fingerprint"
);

finger.innerHTML="🟢";

setTimeout(()=>{

document.getElementById(
"loginScreen"
).style.display="none";

document.getElementById(
"header"
).style.display="flex";

document.getElementById(
"sidebar"
).style.display="block";

document.getElementById(
"main"
).style.display="block";

startBoot();

},2000);

}

/* BOOT */

function startBoot(){

const terminal =
document.getElementById(
"terminal"
);

let logs = [

"Initializing AI core...",
"Loading cyber modules...",
"Securing environment...",
"Checking firewall...",
"System online..."

];

let i=0;

let interval =
setInterval(()=>{

if(i>=logs.length){

clearInterval(interval);

return;

}

terminal.innerHTML +=
`
<p>[+] ${logs[i]}</p>
`;

terminal.scrollTop =
terminal.scrollHeight;

i++;

},1000);

}

/* AI CHAT */

function sendMessage(){

const input =
document.getElementById(
"input"
);

const chat =
document.getElementById(
"chat"
);

let msg =
input.value;

if(msg=="") return;

chat.innerHTML +=
`
<p class="user">
<b>YOU:</b> ${msg}
</p>
`;

let reply =
"Analyzing request...";

msg =
msg.toLowerCase();

if(msg.includes("hello")){

reply =
"Hello Sandesh.";

}

else if(msg.includes("hack")){

reply =
"Ethical hacking system ready.";

}

else if(msg.includes("python")){

reply =
"Python environment active.";

}

else if(msg.includes("linux")){

reply =
"Linux terminal assistant ready.";

}

typingEffect(reply);

input.value="";

}

/* TYPING */

function typingEffect(text){

const chat =
document.getElementById(
"chat"
);

let p =
document.createElement("p");

p.className="ai";

p.innerHTML =
"<b>AI:</b> ";

chat.appendChild(p);

let i=0;

let interval =
setInterval(()=>{

p.innerHTML +=
text.charAt(i);

i++;

chat.scrollTop =
chat.scrollHeight;

if(i>=text.length){

clearInterval(interval);

}

},30);

}

/* VOICE */

function voiceAI(){

const recognition =
new(
window.SpeechRecognition ||
window.webkitSpeechRecognition
)();

recognition.lang =
"en-US";

recognition.start();

recognition.onresult =
function(event){

document.getElementById(
"input"
).value =
event.results[0][0].transcript;

sendMessage();

};

}

/* SCAN */

function fakeScan(){

const terminal =
document.getElementById(
"terminal"
);

let logs = [

"Scanning ports...",
"Analyzing traffic...",
"Detecting threats...",
"Checking encryption...",
"Secure environment detected..."

];

let i=0;

let interval =
setInterval(()=>{

if(i>=logs.length){

clearInterval(interval);

return;

}

terminal.innerHTML +=
`
<p>[+] ${logs[i]}</p>
`;

terminal.scrollTop =
terminal.scrollHeight;

i++;

},1000);

}

</script>

</body>
</html>
